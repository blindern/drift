name: Deploy Ansible common tag
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "ansible/roles/base/**"
      - "ansible/roles/docker/**"
      - "ansible/roles/docker-network/**"
      - "ansible/roles/printerserver-iptables-forward/**"
      - "ansible/roles/ssh-keys/**"
      - "ansible/roles/zerotier/**"
      - "ansible/roles/zincati/**"
      - "ansible/roles/otel-collector-agent/**"
      - "ansible/roles/gcp-credentials/**"
      - "ansible/roles/docker-credential-gcr/**"
      - "ansible/site.yml"
      - "ansible/hosts"
jobs:
  deploy:
    if: vars.DEPLOY_DISABLED != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: deploy-common
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-ansible
        with:
          ssh-private-key: ${{ secrets.FBS_SSH_KEY }}
          git-crypt-key: ${{ secrets.GIT_CRYPT_KEY }}
      - run: ansible-playbook site.yml -t common
        working-directory: ansible
