name: Deploy otel-collector-agent
on:
  push:
    branches: [main]
    paths:
      - ansible/roles/otel-collector-agent/**
      - .github/workflows/deploy-otel-collector-agent.yml
  workflow_dispatch:
jobs:
  deploy:
    if: vars.DEPLOY_DISABLED != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: deploy-otel-collector-agent
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-ansible
        with:
          ssh-private-key: ${{ secrets.FBS_SSH_KEY }}
          git-crypt-key: ${{ secrets.GIT_CRYPT_KEY }}
      - run: ansible-playbook site.yml -l fcos -t otel-collector-agent
        working-directory: ansible
