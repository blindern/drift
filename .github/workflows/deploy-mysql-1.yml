name: Deploy mysql-1
on:
  push:
    branches: [main]
    paths:
      - ansible/roles/service-mysql-1/**
      - .github/workflows/deploy-mysql-1.yml
  workflow_dispatch:
jobs:
  deploy:
    if: vars.DEPLOY_DISABLED != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: deploy-mysql-1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup-ansible
        with:
          ssh-private-key: ${{ secrets.FBS_SSH_KEY }}
          git-crypt-key: ${{ secrets.GIT_CRYPT_KEY }}
      - run: ansible-playbook site.yml -l fcos-2 -t service-mysql-1
        working-directory: ansible
