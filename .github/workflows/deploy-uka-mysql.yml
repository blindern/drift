name: Deploy uka-mysql
on:
  push:
    branches: [main]
    paths:
      - ansible/roles/service-uka-mysql/**
      - .github/workflows/deploy-uka-mysql.yml
  workflow_dispatch:
jobs:
  deploy:
    if: vars.DEPLOY_DISABLED != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: deploy-uka-mysql
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-ansible
        with:
          ssh-private-key: ${{ secrets.FBS_SSH_KEY }}
          git-crypt-key: ${{ secrets.GIT_CRYPT_KEY }}
      - run: ansible-playbook site.yml -l fcos-1 -t service-uka-mysql
        working-directory: ansible
