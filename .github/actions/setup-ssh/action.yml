name: Setup SSH
description: Load SSH key and configure known hosts
inputs:
  ssh-private-key:
    description: 'SSH private key'
    required: true
runs:
  using: composite
  steps:
    - uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
      with:
        ssh-private-key: ${{ inputs.ssh-private-key }}
    - run: ssh-add -l
      shell: bash
    - run: cat .github/known_hosts >>~/.ssh/known_hosts
      shell: bash
    - run: cp .github/sshconfig ~/.ssh/config
      shell: bash
